services:
  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      # Dual Listeners: 9092 for Windows (localhost), 29092 for Spark (internal)
      - KAFKA_LISTENERS=PLAINTEXT://:9092,INTERNAL://:29092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092,INTERNAL://kafka:29092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
    healthcheck:
      test: ["CMD", "bash", "-lc", "echo > /dev/tcp/localhost/9092"]
      interval: 10s
      timeout: 5s
      retries: 10

  spark-master:
    image: apache/spark:3.5.1
    container_name: spark-master
    user: root
    environment:
      - SPARK_MODE=master
    volumes:
      - .:/opt/spark/work-dir
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "7077:7077"
    depends_on:
      kafka:
        condition: service_healthy

  spark-worker:
    image: apache/spark:3.5.1
    container_name: spark-worker
    user: root
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_CORES=2
      - SPARK_WORKER_MEMORY=2G
    depends_on:
      - spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    ports:
      - "7078:7078"

  inference_api:
    build:
      context: .
      dockerfile: ml_service/Dockerfile
    container_name: inference_api
    environment:
      - PYTHONUNBUFFERED=1
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - METRICS_DB_PATH=/app/experiments/metrics/metrics.db
    volumes:
      - ./experiments/artifacts:/app/experiments/artifacts
      - ./experiments/metrics:/app/experiments/metrics
    ports:
      - "8000:8000"
    depends_on:
      - mlflow

  mlflow:
    build:
      context: .
      dockerfile: mlflow/Dockerfile
    container_name: mlflow
    working_dir: /mlflow
    volumes:
      - ./experiments/mlflow:/mlflow
    ports:
      - "5000:5000"

  trainer:
    build:
      context: .
      dockerfile: ml_service/Dockerfile
    container_name: trainer
    working_dir: /app
    command: python experiments/train_model.py
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - MLFLOW_EXPERIMENT_NAME=predictive-twin-pro
    volumes:
      - .:/app
    depends_on:
      - mlflow

  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    container_name: dashboard
    environment:
      - INFERENCE_API_URL=http://inference_api:8000
    ports:
      - "8501:8501"
    depends_on:
      - inference_api